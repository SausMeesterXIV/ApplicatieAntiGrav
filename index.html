<!doctype html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description"
    content="De officiële KSA LeidingsApp voor strepen, agenda, frituur, bierpong en meer. Beheer je jeugdbeweging vanuit één app." />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KSA App" />
  <link rel="icon" type="image/jpeg" href="/pwa-192x192.jpg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.jpg" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <title>KSA LeidingsApp</title>
</head>

<body class="text-slate-900 antialiased selection:bg-ksa-orange selection:text-white">
  <div id="root">
    <style>
      #root:empty {
        display: none;
      }
      .ksasplash {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100dvh;
        width: 100vw;
        background-color: #0f172a;
        margin: 0;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
      }
      .ksasplash img {
        width: 120px;
        height: 120px;
        border-radius: 28px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        animation: ksasplash-pulse 2s infinite ease-in-out;
      }
      .ksasplash p {
        margin-top: 24px;
        color: #f8fafc;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.05em;
      }
      @keyframes ksasplash-pulse {
        0% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.02); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.8; }
      }
    </style>
    <div class="ksasplash">
      <img src="/pwa-512x512.jpg" alt="KSA Logo" />
      <p>KSA LeidingsApp</p>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
